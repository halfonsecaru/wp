@let bgStyle = createBackgroundsStyle(); @let paddingStyle = createPaddingStyle(); @let textStyle = createTextStyle(); @let layoutStyle = createDisplayAndLayoutStyle(); @let customClass =
customClassComputed(); @let customStyle = customStyleComputed();

<div
  [class]="'alf-tab-content ' + customClass + ' ' + currentAnimationClass()"
  [class.alf-tab-expand]="isActive() && (expandHeight() || inputConfig()?.expandHeight)"
  [class.alf-tab-use-expand]="expandHeight() || inputConfig()?.expandHeight"
  [style.display]="isActive() || isExiting() ? null : 'none'"
  [style.pointer-events]="isActive() ? 'auto' : 'none'"
  [style.width]="'100%'"
  [style]="
    bgStyle + paddingStyle + textStyle + layoutStyle + animationStyle() + customStyle
  "
>
  <div #contentInner class="alf-tab-content-inner">
    <ng-content />
  </div>
</div>
