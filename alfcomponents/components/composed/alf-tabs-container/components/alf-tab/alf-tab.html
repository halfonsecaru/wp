@let bgStyle = createBackgroundsStyle();
@let paddingStyle = createPaddingStyle();
@let textStyle = createTextStyle();
@let customClass = customClassComputed();
@let customStyle = customStyleComputed();

<div 
  [class]="'alf-tab-content ' + customClass + ' ' + (isActive() ? (effectiveAnimations()?.enterStage ?? '') : '')"
  [style.display]="isActive() ? 'block' : 'none'"
  [style]="bgStyle + paddingStyle + textStyle + animationStyle() + customStyle"
>
  <ng-content />
</div>
