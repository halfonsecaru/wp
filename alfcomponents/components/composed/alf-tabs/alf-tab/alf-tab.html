@let s = styleVariablesComputed();
@let visualType = visualTypeComputed();
@let config = configComputed();

<div 
  class="alf-tab__header"
  [class]="'alf-tab__header--' + visualType"
  [class.alf-tab__header--active]="isActive()"
  [class.alf-tab__header--solid]="isSolidComputed()"
  [class.alf-tab__header--disabled]="config?.disabled"
  [alfRipple]="rippleConfig()"
  [attr.role]="'tab'"
  [attr.aria-selected]="isActive()"
  [attr.id]="tabId()"
  [attr.aria-controls]="panelId()"
  [attr.tabindex]="config?.disabled ? -1 : 0"
  [style]="s"
  (click)="selectTab()"
  (keydown.enter)="selectTab()"
  (keydown.space)="selectTab()"
>
  @if (config?.prefix) {
    <span class="alf-tab__icon alf-tab__icon--prefix">{{ config?.prefix }}</span>
  }

  <span class="alf-tab__label">{{ config?.label }}</span>

  @if (config?.badge !== undefined) {
    <span class="alf-tab__badge">{{ config?.badge }}</span>
  }

  @if (config?.suffix) {
    <span class="alf-tab__icon alf-tab__icon--suffix">{{ config?.suffix }}</span>
  }
</div>

<!-- 
  Capturador de contenido anidado (API estilo Material).
  Se envuelve en ng-template para que no se renderice aquí, 
  sino que sea el padre (AlfTabs) quien controle dónde y cuándo mostrarlo.
-->
<ng-template #contentTemplate>
  <ng-content></ng-content>
</ng-template>
