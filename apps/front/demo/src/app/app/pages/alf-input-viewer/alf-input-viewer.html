<div class="viewer-container">
  <h1>Input</h1>

  <!-- Input Types -->
  <section class="viewer-section">
    <h2>Input Types</h2>
    <div class="card viewer-grid">
      <div class="flex flex-col gap-2">
        <label>Text</label>
        <alf-input label="Nombre" [type]="AlfInputTypeEnum.Text" placeholder="Tu nombre..."></alf-input>
      </div>

      <div class="flex flex-col gap-2">
        <label>Email</label>
        <alf-input label="Email" [type]="AlfInputTypeEnum.Email" placeholder="usuario@ejemplo.com"></alf-input>
      </div>

      <div class="flex flex-col gap-2">
        <label>Password</label>
        <alf-input label="Contraseña" [type]="AlfInputTypeEnum.Password" placeholder="********"></alf-input>
      </div>

      <div class="flex flex-col gap-2">
        <label>Number</label>
        <alf-input label="Edad" [type]="AlfInputTypeEnum.Number" placeholder="0"></alf-input>
      </div>

      <div class="flex flex-col gap-2">
        <label>Tel</label>
        <alf-input label="Teléfono" [type]="AlfInputTypeEnum.Tel" placeholder="+34 000 000 000"></alf-input>
      </div>

      <div class="flex flex-col gap-2">
        <label>Url</label>
        <alf-input label="Sitio Web" [type]="AlfInputTypeEnum.Url" placeholder="https://..."></alf-input>
      </div>

      <div class="flex flex-col gap-2">
        <label>Search</label>
        <alf-input label="Buscar" [type]="AlfInputTypeEnum.Search" placeholder="Escribe para buscar..."></alf-input>
      </div>


    </div>
  </section>

  <!-- Basic Appearance -->
  <section class="viewer-section">
    <div class="card viewer-grid">
      <div class="flex flex-col gap-2">
        <alf-input
          id="basic-input"
          label="Outline"
          placeholder="Escribe algo..."
          [appearance]="AlfInputAppearanceEnum.Outline"
          [prefix]="AlfInputAdornmentEnum.At"
        ></alf-input>
      </div>

      <div class="flex flex-col gap-2">
        <alf-input
          id="fill-input"
          label="Fill"
          placeholder="Escribe algo..."
          [appearance]="AlfInputAppearanceEnum.Fill"
          [prefix]="AlfInputAdornmentEnum.At"
        ></alf-input>
      </div>

      <div class="flex flex-col gap-2">
        <alf-input
          id="standard-input"
          label="Standard"
          placeholder="Escribe algo..."
          [appearance]="AlfInputAppearanceEnum.Standard"
          [prefix]="AlfInputAdornmentEnum.At"
        ></alf-input>
      </div>
    </div>
  </section>

  <!-- Outline Variants -->
  <section class="viewer-section">
    <h2>Outline Variants</h2>
    <div class="card viewer-grid">
      <div class="flex flex-col gap-2">
        <alf-input label="Default" [appearance]="AlfInputAppearanceEnum.Outline" [colorVariant]="AlfColorVariantEnum.Default"></alf-input>
      </div>
      <div class="flex flex-col gap-2">
        <alf-input label="Primary" [appearance]="AlfInputAppearanceEnum.Outline" [colorVariant]="AlfColorVariantEnum.Primary"></alf-input>
      </div>
      <div class="flex flex-col gap-2">
        <alf-input label="Secondary" [appearance]="AlfInputAppearanceEnum.Outline" [colorVariant]="AlfColorVariantEnum.Secondary"></alf-input>
      </div>
      <div class="flex flex-col gap-2">
        <alf-input label="Success" [appearance]="AlfInputAppearanceEnum.Outline" [colorVariant]="AlfColorVariantEnum.Success"></alf-input>
      </div>
      <div class="flex flex-col gap-2">
        <alf-input label="Danger" [appearance]="AlfInputAppearanceEnum.Outline" [colorVariant]="AlfColorVariantEnum.Danger"></alf-input>
      </div>
      <div class="flex flex-col gap-2">
        <alf-input label="Warning" [appearance]="AlfInputAppearanceEnum.Outline" [colorVariant]="AlfColorVariantEnum.Warning"></alf-input>
      </div>
      <div class="flex flex-col gap-2">
        <alf-input label="Info" [appearance]="AlfInputAppearanceEnum.Outline" [colorVariant]="AlfColorVariantEnum.Info"></alf-input>
      </div>
      <div class="flex flex-col gap-2">
        <alf-input label="Light" [appearance]="AlfInputAppearanceEnum.Outline" [colorVariant]="AlfColorVariantEnum.Light"></alf-input>
      </div>
      <div class="flex flex-col gap-2">
        <alf-input label="Dark" [appearance]="AlfInputAppearanceEnum.Outline" [colorVariant]="AlfColorVariantEnum.Dark"></alf-input>
      </div>
    </div>
  </section>

  <!-- Fill Variants -->
  <section class="viewer-section">
    <h2>Fill Variants</h2>
    <div class="card viewer-grid">
      <div class="flex flex-col gap-2">
        <alf-input label="Default" [appearance]="AlfInputAppearanceEnum.Fill" [colorVariant]="AlfColorVariantEnum.Default"></alf-input>
      </div>
      <div class="flex flex-col gap-2">
        <alf-input label="Primary" [appearance]="AlfInputAppearanceEnum.Fill" [colorVariant]="AlfColorVariantEnum.Primary"></alf-input>
      </div>
      <div class="flex flex-col gap-2">
        <alf-input label="Secondary" [appearance]="AlfInputAppearanceEnum.Fill" [colorVariant]="AlfColorVariantEnum.Secondary"></alf-input>
      </div>
      <div class="flex flex-col gap-2">
        <alf-input label="Success" [appearance]="AlfInputAppearanceEnum.Fill" [colorVariant]="AlfColorVariantEnum.Success"></alf-input>
      </div>
      <div class="flex flex-col gap-2">
        <alf-input label="Danger" [appearance]="AlfInputAppearanceEnum.Fill" [colorVariant]="AlfColorVariantEnum.Danger"></alf-input>
      </div>
      <div class="flex flex-col gap-2">
        <alf-input label="Warning" [appearance]="AlfInputAppearanceEnum.Fill" [colorVariant]="AlfColorVariantEnum.Warning"></alf-input>
      </div>
      <div class="flex flex-col gap-2">
        <alf-input label="Info" [appearance]="AlfInputAppearanceEnum.Fill" [colorVariant]="AlfColorVariantEnum.Info"></alf-input>
      </div>
      <div class="flex flex-col gap-2">
        <alf-input label="Light" [appearance]="AlfInputAppearanceEnum.Fill" [colorVariant]="AlfColorVariantEnum.Light"></alf-input>
      </div>
      <div class="flex flex-col gap-2">
        <alf-input label="Dark" [appearance]="AlfInputAppearanceEnum.Fill" [colorVariant]="AlfColorVariantEnum.Dark"></alf-input>
      </div>
    </div>
  </section>

  <!-- Standard Variants -->
  <section class="viewer-section">
    <h2>Standard Variants</h2>
    <div class="card viewer-grid">
      <div class="flex flex-col gap-2">
        <alf-input label="Default" [appearance]="AlfInputAppearanceEnum.Standard" [colorVariant]="AlfColorVariantEnum.Default"></alf-input>
      </div>
      <div class="flex flex-col gap-2">
        <alf-input label="Primary" [appearance]="AlfInputAppearanceEnum.Standard" [colorVariant]="AlfColorVariantEnum.Primary"></alf-input>
      </div>
      <div class="flex flex-col gap-2">
        <alf-input label="Secondary" [appearance]="AlfInputAppearanceEnum.Standard" [colorVariant]="AlfColorVariantEnum.Secondary"></alf-input>
      </div>
      <div class="flex flex-col gap-2">
        <alf-input label="Success" [appearance]="AlfInputAppearanceEnum.Standard" [colorVariant]="AlfColorVariantEnum.Success"></alf-input>
      </div>
      <div class="flex flex-col gap-2">
        <alf-input label="Danger" [appearance]="AlfInputAppearanceEnum.Standard" [colorVariant]="AlfColorVariantEnum.Danger"></alf-input>
      </div>
      <div class="flex flex-col gap-2">
        <alf-input label="Warning" [appearance]="AlfInputAppearanceEnum.Standard" [colorVariant]="AlfColorVariantEnum.Warning"></alf-input>
      </div>
      <div class="flex flex-col gap-2">
        <alf-input label="Info" [appearance]="AlfInputAppearanceEnum.Standard" [colorVariant]="AlfColorVariantEnum.Info"></alf-input>
      </div>
      <div class="flex flex-col gap-2">
        <alf-input label="Light" [appearance]="AlfInputAppearanceEnum.Standard" [colorVariant]="AlfColorVariantEnum.Light"></alf-input>
      </div>
      <div class="flex flex-col gap-2">
        <alf-input label="Dark" [appearance]="AlfInputAppearanceEnum.Standard" [colorVariant]="AlfColorVariantEnum.Dark"></alf-input>
      </div>
    </div>
  </section>

  <!-- States & Validation -->
  <section class="viewer-section">
    <h2>States & Validation</h2>
    <div class="card viewer-grid">
  

      <div class="flex flex-col gap-2">
        <label>Helper Text</label>
        <alf-input
          label="Contraseña"
          type="password"
          helperText="Mínimo 8 caracteres"
          [prefix]="AlfInputAdornmentEnum.Lock"
        ></alf-input>
      </div>

      <div class="flex flex-col gap-2">
        <label>Loading State</label>
        <alf-input
          label="Buscando..."
          [loading]="true"
          placeholder="Espere por favor"
        ></alf-input>
      </div>

      <div class="flex flex-col gap-2">
        <label>Character Counter</label>
        <alf-input
          label="Biografía"
          [maxLength]="50"
          value="Hola, soy un desarrollador Élite"
          [showCharCounter]="true"
        ></alf-input>
      </div>

      <div class="flex flex-col gap-2">
        <label>Required Field</label>
        <alf-input
          label="Nombre Obligatorio"
          [required]="true"
          placeholder="Este campo es necesario"
        ></alf-input>
      </div>

      <div class="flex flex-col gap-2">
        <label>Readonly State</label>
        <alf-input
          label="ID de Usuario"
          value="USR-123456"
          [readonly]="true"
        ></alf-input>
      </div>
    </div>
  </section>
</div>
