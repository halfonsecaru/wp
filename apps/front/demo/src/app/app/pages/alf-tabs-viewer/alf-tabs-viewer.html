@let config = tabsConfig();

<div class="demo-container">
  <header class="demo-header">
    <h1>Configuración de Cuenta</h1>
    <p>Administra tus preferencias y ajustes de seguridad.</p>
  </header>

  <div class="basic-card">
    <alf-tabs-container>
      @for (tab of nestedTabs; track tab.name) {
        <alf-tab [tabName]="tab.name">
          <div class="tab-pane">
            <h2 style="margin-bottom: 20px;">Panel {{ tab.name }}</h2>
            
            <!-- Pestañas Anidadas -->
            <alf-tabs-container>
              @for (sub of tab.subTabs; track sub.name) {
                <alf-tab [tabName]="sub.name">
                  <div class="tab-pane sub-pane" style="background: rgba(0,0,0,0.02); border-radius: 8px; padding: 15px;">
                    <h4>{{ sub.name }}</h4>
                    @for (line of sub.lines; track line) {
                      <p>{{ line }}</p>
                    }
                  </div>
                </alf-tab>
              }
            </alf-tabs-container>

          </div>
        </alf-tab>
      }
    </alf-tabs-container>
  </div>
</div>
