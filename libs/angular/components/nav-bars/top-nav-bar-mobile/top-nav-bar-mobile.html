<div class="mobile-topbar show-on-mobile">
  <div class="mobile-container">
    <div>
      <h3 class="mobile-title-center">{{ nombreApp }}</h3>
    </div>
    <div class="mobile-side">
      <button class="menu-icon" (click)="menuAbierto.set(!menuAbierto())">
        <svg
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <rect y="6" width="24" height="2" rx="1" fill="currentColor" />
          <rect y="11" width="24" height="2" rx="1" fill="currentColor" />
          <rect y="16" width="24" height="2" rx="1" fill="currentColor" />
        </svg>
      </button>
    </div>
  </div>
  <div
    class="crystal-bg mobile-menu-overlay"
    [class.mobile-menu-overlay-expand]="menuAbierto()"
    [class.mobile-menu-overlay-collapse]="!menuAbierto()"
  >
    <app-sidebar
      [menuSignal]="menuSignal"
      [menuClickFn]="menuClickFn"
      [isMobile]="true"
      [minWidthPercent]="100"
    ></app-sidebar>
  </div>
</div>
