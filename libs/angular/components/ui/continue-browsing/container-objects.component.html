<div class="continue-browsing-container">
  <h2 class="title">Continúa desde donde lo dejaste</h2>
  <div class="products-grid">
    @for (product of products(); track product.id) {
      <div class="product-card" (click)="goToDetail(product.id)">
        <img [src]="product.imageUrl" alt="Producto" />
      </div>
    }
  </div>
</div>
